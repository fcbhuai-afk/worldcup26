<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 世界杯观赛数据库</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div>
          <p class="eyebrow">World Cup 26</p>
          <h1>2026 世界杯观赛数据库</h1>
          <p class="subtitle">赛程、比分状态、小组积分与多源核对集中在一页里。</p>
        </div>
        <div class="summary-grid" aria-label="数据概览">
          <div>
            <strong id="matchCount">104</strong>
            <span>比赛</span>
          </div>
          <div>
            <strong id="teamCount">48</strong>
            <span>球队</span>
          </div>
          <div>
            <strong id="venueCount">16</strong>
            <span>场馆</span>
          </div>
          <div>
            <strong id="crosscheckCount">104</strong>
            <span>核对通过</span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="筛选比赛">
        <div class="control-group">
          <label for="stageFilter">阶段</label>
          <select id="stageFilter"></select>
        </div>
        <div class="control-group">
          <label for="groupFilter">小组</label>
          <select id="groupFilter"></select>
        </div>
        <div class="control-group">
          <label for="statusFilter">状态</label>
          <select id="statusFilter"></select>
        </div>
        <div class="control-group search">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="球队、城市、场馆" />
        </div>
      </section>

      <section class="section-band">
        <div class="section-head">
          <div>
            <h2>比赛赛程</h2>
            <p id="resultHint">正在载入比赛。</p>
          </div>
          <button id="resetFilters" type="button">重置筛选</button>
        </div>
        <div id="matches" class="matches" aria-live="polite"></div>
      </section>

      <section class="section-band">
        <div class="section-head">
          <div>
            <h2>小组积分</h2>
            <p>来自 ESPN 积分接口，后续可继续补充 FIFA 官方口径。</p>
          </div>
        </div>
        <div id="standings" class="standings"></div>
      </section>

      <section class="section-band">
        <div class="section-head">
          <div>
            <h2>场馆概览</h2>
            <p>按场馆统计承办场次，方便安排重点观赛窗口。</p>
          </div>
        </div>
        <div id="venues" class="venue-grid"></div>
      </section>
    </main>

    <footer>
      <p>数据源：TheStatsAPI、ESPN、直播吧/球迷宝。页面适合小范围分享，后续可继续接入球员、伤停和赛前模型。</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
